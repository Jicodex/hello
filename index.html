<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 15px;
        }

        p {
            font-size: 15px;
            color: #555;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background: #25D366;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #1ebe5d;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Contact Me</h1>
        <p>
            First of all, I apologize. If you don't mind, could you please send me a message on this WhatsApp number? I'm waiting.
            If you send me a message, I will delete this page.
        </p>

        <a href="https://wa.link/lcdea9" target="_blank" class="btn">
            Message on WhatsApp +8801766596669
        </a>
    </div>

</body>
</html>
